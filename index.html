<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Parcel API Testing</title>\n    <link rel="stylesheet" href="styles.css">\n</head>\n<body>\n    <header>\n        <h1>Parcel API Testing Interface</h1>\n    </header>\n    <main>\n        <section id="service-status">\n            <h2>Service Status</h2>\n            <div id="status">Checking...</div>\n        </section>\n        <section id="quote-form">\n            <h2>Get a Quote</h2>\n            <form id="quoteRequest">\n                <input type="text" name="origin" placeholder="Origin" required>\n                <input type="text" name="destination" placeholder="Destination" required>\n                <button type="submit">Get Quote</button>\n            </form>\n            <div id="quoteResponse"></div>\n        </section>\n        <section id="shipment">\n            <h2>Create Shipment</h2>\n            <form id="shipmentCreation">\n                <input type="text" name="parcelDetails" placeholder="Parcel Details" required>\n                <button type="submit">Create Shipment</button>\n            </form>\n            <div id="shipmentResponse"></div>\n        </section>\n        <section id="tracking">\n            <h2>Track Shipment</h2>\n            <input type="text" id="trackingNumber" placeholder="Tracking Number">\n            <button id="trackButton">Track</button>\n            <div id="trackingResponse"></div>\n        </section>\n    </main>\n    <script src="app.js"></script>\n</body>\n</html>\n
